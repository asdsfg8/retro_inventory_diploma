<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ретро Інвентар{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Додано Tom Select CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand text-white" href="/">🕹️ Retro Inventory</a>

        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'collection_list' %}active text-white fw-bold{% endif %}" href="{% url 'inventory:collection_list' %}">Колекція</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'storage_manager' %}active text-white fw-bold{% endif %}" href="{% url 'inventory:storage_manager' %}">Сховища</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active text-white fw-bold{% endif %}" href="{% url 'inventory:dashboard' %}">📊 Аналітика</a>
            </li>
        </ul>
        
        <div class="d-flex">
            {% if user.is_authenticated %}
                <span class="navbar-text me-3 text-white">Привіт, {{ user.username }}!</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary btn-sm me-2">Увійти</a>
                <a href="{% url 'inventory:register' %}" class="btn btn-success btn-sm">Реєстрація</a> 
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Додано Tom Select JS -->
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
</body>
</html>
